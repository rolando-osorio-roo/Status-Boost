name: Update Template CI
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
jobs:
  update-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.42.5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          command: update-template
